<!DOCTYPE html>
<html>
<head>
  <title>Render Data dengan Menu</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      width: 100px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h2>MENU</h2>
<button onclick="tampilkan('table')">Table</button>
<button onclick="tampilkan('list')">List</button>
<button onclick="tampilkan('card')">Card</button>
<button onclick="tampilkan('menu')">Menu</button>
<button onclick="tampilkan('array')">Array</button>

<hr>

<div id="output"></div>

<script>
const data = [
  { id: 1, nama: "Satu" },
  { id: 2, nama: "Dua" },
  { id: 3, nama: "Tiga" },
  { id: 4, nama: "Empat" },
  { id: 5, nama: "Lima" },
  { id: 6, nama: "Enam" },
  { id: 7, nama: "Tujuh" },
  { id: 8, nama: "Delapan" },
  { id: 9, nama: "Sembilan" }
];

// FUNCTION UTAMA (DRY & REUSABLE)
function render(type, data) {
  let output = "";

  if (type === "table") {
    output += "<table border='1'><tr><th>ID</th><th>Nama</th></tr>";
    data.forEach(item => {
      output += `<tr><td>${item.id}</td><td>${item.nama}</td></tr>`;
    });
    output += "</table>";
  }

  else if (type === "list") {
    output += "<ul>";
    data.forEach(item => {
      output += `<li>${item.id} - ${item.nama}</li>`;
    });
    output += "</ul>";
  }

  else if (type === "card") {
    output += "<div class='card-container'>";
    data.forEach(item => {
      output += `
        <div class='card'>
          <h4>${item.nama}</h4>
          <p>ID: ${item.id}</p>
        </div>
      `;
    });
    output += "</div>";
  }

  else if (type === "menu") {
    output += "<nav><ul style='display:flex;gap:10px'>";
    data.forEach(item => {
      output += `<li>${item.nama}</li>`;
    });
    output += "</ul></nav>";
  }

  else if (type === "array") {
    output = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
  }

  return output;
}

// FUNCTION CONTROL MENU
function tampilkan(type) {
  document.getElementById("output").innerHTML = render(type, data);
}
</script>

</body>
</html>
